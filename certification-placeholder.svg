<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder certification</title>
  <desc id="desc">Image de remplacement pour la certification avec zone photo et zone preuve.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1f23"/>
      <stop offset="100%" stop-color="#17353b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect x="70" y="70" width="1060" height="660" rx="26" fill="none" stroke="#82e7bf" stroke-opacity="0.45" stroke-width="4"/>
  <text x="600" y="260" text-anchor="middle" font-size="64" font-family="Arial, sans-serif" fill="#d8f5e8">Ajoute ici ta certification</text>
  <text x="600" y="350" text-anchor="middle" font-size="36" font-family="Arial, sans-serif" fill="#b6dfce">(image / capture / PDF converti en image)</text>
  <text x="600" y="470" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#9fd7c1">Puis ajoute le lien de preuve sur le bouton</text>
</svg>
